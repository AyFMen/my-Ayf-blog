{% extends 'blog/base.html' %}

{% block content %}
    <h2 class="post-title">New post</h2>

    <form method="POST" class="post-form">
        {% csrf_token %}

        <div class="form-group">
            {{ form.as_p }}
        </div>

        <button type="submit" class="save btn btn-primary">Save</button>
    </form>
{% endblock %}
